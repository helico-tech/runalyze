server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: any unknown path is a client-side route → serve index.html
    # so BrowserRouter deep-links and refreshes work instead of 404ing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vite emits content-hashed filenames in /assets — safe to cache forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Never cache the HTML shell, so new deploys are picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml font/woff2;
}
