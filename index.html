<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Set the theme before first paint so light-theme users don't flash dark. -->
    <script>
      try {
        if (localStorage.getItem('runalyze:theme') === 'light')
          document.documentElement.setAttribute('data-theme', 'light')
      } catch (e) {}
    </script>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='4' fill='%237c74ff'/%3E%3Crect x='5' y='5' width='6' height='6' rx='1.5' fill='none' stroke='white' stroke-width='1.6'/%3E%3C/svg%3E"
    />
    <title>Runalyze</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
